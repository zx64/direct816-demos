name: Direct816_Demos

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:
  build:
    name: Direct816 Demos
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      matrix:
        include:
        - name: direct816_demos

    env:
      CI_RELEASE_FILENAME: ${{ matrix.name }}-${{ github.event.release.tag_name || github.sha }}
      CI_PROJECT_ROOT: ${{ github.workspace }}/src-${{ github.sha }}
      CI_BUILD_ROOT: ${{ github.workspace }}
      CI_USE_ENV: 1

    steps:
    - name: Compiler Cache Fixup
      run: |
        mkdir -p /home/runner/.ccache
  
    - name: "CCache: Restore saved cache"
      uses: actions/cache@v5
      with:
        path: /home/runner/.ccache
        key: ccache-direct816-${{ matrix.name }}-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ccache-direct816-${{ matrix.name }}-${{ github.ref }}
          ccache-direct816-${{ matrix.name }}-

    - name: "Checkout Project"
      uses: actions/checkout@v7
      with:
        submodules: true
        path: ${{ env.CI_PROJECT_ROOT }}

    - name: "Prepare All: Generate cache key"
      shell: bash
      run: |
        echo "CI_CACHE_KEY=`shasum "$CI_PROJECT_ROOT/ci/direct816_demos.sh" | cut -d " " -f 1`" >> $GITHUB_ENV

    - name: "Prepare All: Restore saved cache"
      id: cache-prepare-all
      uses: actions/cache@v5
      with:
        path: ${{ env.CI_BUILD_ROOT }}
        key: prepare-all-${{ env.CI_CACHE_KEY }}
        restore-keys: |
          prepare-all-${{ env.CI_CACHE_KEY }}

    - name: "Install Arm GNU Toolchain (arm-none-eabi-gcc)"
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      with:
        release: '15.2.Rel1'

    - name: "Prepare All: Install dependencies"
      if: steps.cache-prepare-all.outputs.cache-hit == 'true'
      shell: bash
      run: |
        source $CI_PROJECT_ROOT/ci/direct816_demos.sh
        ci_install_build_deps

    - name: "Prepare All: Prepare tools & dependencies"
      if: steps.cache-prepare-all.outputs.cache-hit != 'true'
      shell: bash
      run: |
        source $CI_PROJECT_ROOT/ci/direct816_demos.sh
        mkdir -p $CI_BUILD_ROOT
        ci_install_build_deps
        ci_prepare_all

    - name: "Direct816 Demos: Build"
      shell: bash
      run: |
        source $CI_PROJECT_ROOT/ci/direct816_demos.sh
        ci_build

    - name: "Artifacts: Upload natmods.zip"
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.CI_RELEASE_FILENAME }}_natmods.zip
        path: |
          ${{ env.CI_BUILD_ROOT }}/_direct8_effects.mpy
          ${{ env.CI_BUILD_ROOT }}/_direct16_effects.mpy
        compression-level: 9

    - name: "Artifacts: Upload direct816_demos.zip"
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.CI_RELEASE_FILENAME }}.zip
        path: ${{ env.CI_BUILD_ROOT }}/${{ env.CI_RELEASE_FILENAME }}.zip
        archive: false

    - name: "Release: Upload direct816_demos.zip"
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v3
      with:
        working_directory: ${{ env.CI_BUILD_ROOT }}
        files: ${{ env.CI_RELEASE_FILENAME }}.zip
